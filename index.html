        // High performance Math Flow Field Background Particle Network
        function runFlowFieldBackground() {
            const canvas = document.getElementById('interactive-flowfield');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            const mouse = {
                x: null,
                y: null,
                radius: 130
            };

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class FluidParticle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.speedX = (Math.random() - 0.5) * 0.35;
                    this.speedY = (Math.random() - 0.5) * 0.35;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.baseOpacity = Math.random() * 0.12 + 0.03;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;

                    // Bound collision wrapping
                    if (this.x < 0 || this.x > width) this.speedX *= -1;
                    if (this.y < 0 || this.y > height) this.speedY *= -1;

                    // Mouse gravity pushback vector
                    if (mouse.x !== null && mouse.y !== null) {
                        const dx = this.x - mouse.x;
                        const dy = this.y - mouse.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < mouse.radius) {
                            const force = (mouse.radius - dist) / mouse.radius;
                            const angle = Math.atan2(dy, dx);
                            this.x += Math.cos(angle) * force * 1.8;
                            this.y += Math.sin(angle) * force * 1.8;
                        }
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.baseOpacity})`;
                    ctx.fill();
                }
            }

            // Populate system
            const totalParticles = 60;
            for (let i = 0; i < totalParticles; i++) {
                particles.push(new FluidParticle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();

                    // Soft range connection vector lines
                    for (let j = i + 1; j < particles.length; j++) {
                        const range = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                        if (range < 130) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            
                            const vectorOpacity = 0.03 * (1 - range / 130);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${vectorOpacity})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = function() {
            renderNavGrid();
            buildDynamicAnchors();
            runFlowFieldBackground();
        };
